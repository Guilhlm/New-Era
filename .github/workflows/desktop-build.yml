name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish desktop release
        run: npm run build:desktop:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: New-Era-Setup
          path: |
            app/desktop/dist/New-Era Setup.exe
            app/desktop/dist/latest.yml
