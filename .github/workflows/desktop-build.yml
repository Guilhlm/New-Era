name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare build env
        shell: pwsh
        run: |
          Copy-Item "app/api/.env.example" "app/api/.env"
          Copy-Item "app/web/.env.example" "app/web/.env.local"

      - name: Install dependencies
        run: npm ci

      - name: Build desktop installer
        env:
          DESKTOP_UPDATE_GH_TOKEN: ${{ secrets.DESKTOP_UPDATE_GH_TOKEN }}
        run: npm run build:desktop

      - name: Verify build artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path "app/desktop/dist/New-Era-Setup.exe")) {
            throw "Missing installer: app/desktop/dist/New-Era-Setup.exe"
          }
          if (-not (Test-Path "app/desktop/dist/latest.yml")) {
            throw "Missing update metadata: app/desktop/dist/latest.yml"
          }
          $yml = Get-Content "app/desktop/dist/latest.yml" -Raw
          if ($yml -notmatch 'New-Era-Setup\.exe') {
            throw "latest.yml must reference New-Era-Setup.exe"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Implementação de número de versão app + testes (${{ github.ref_name }})
          files: |
            app/desktop/dist/New-Era-Setup.exe
            app/desktop/dist/latest.yml
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: New-Era-Setup
          path: |
            app/desktop/dist/New-Era-Setup.exe
            app/desktop/dist/latest.yml
