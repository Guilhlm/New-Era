name: New-era

services:
  postgres:
    image: postgres:16-alpine
    container_name: new-era-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    # Bind to loopback only: o banco nunca fica exposto na rede local/LAN,
    # apenas para processos no próprio host (API/Prisma via localhost).
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
